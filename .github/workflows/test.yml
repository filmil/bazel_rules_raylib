name: Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "43 7 * * 0"
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install prereqs
        run: "bazel run //third_party/deps:ubuntu"
      - name: Build
        run: bazel build //...
      - name: Test
        run: bazel test //...
      - name: Integration
        run: "cd integration && bazel build //third_party/luk707_games/examples/..."

